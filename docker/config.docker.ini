[server]
; Docker image binds all interfaces so the mapped host port can reach it.
host = 0.0.0.0
port = 8321
base_path = /
request_body_limit_bytes = 1048576
max_concurrent_requests = 32
cors_enabled = false
cors_allow_origin = *
health_requires_auth = false

[stoolap]
; The image contains the Stoolap FFI library at this path.
library_path = /opt/liquidstoolap/libstoolap.so
; Keep the database on the mounted /data volume.
database_path = /data/stoolap.db
read_only = false
sql_worker_count = 0
busy_timeout_ms = 5000
startup_check = true

[auth]
enabled = true
issue_tokens = true
username = admin
; Keep the password file on the mounted /data volume.
password_file = /data/admin.password
token_ttl_seconds = 3600
allow_static_tokens = false
static_tokens_file =
token_revoke_on_restart = true

[timeouts]
request_timeout_ms = 30000
max_sql_timeout_ms = 60000
shutdown_grace_ms = 15000

[logging]
level = INFO
format = json
access_log = true
sql_log = false
redact_sql_params = true
include_request_id = true

[observability]
enable_metrics = false
metrics_bind_host = 127.0.0.1
metrics_port = 9095

[cli]
default_output = json
