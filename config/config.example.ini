[server]
; Interface to bind. Keep 127.0.0.1 unless the service is protected by a trusted network, VPN, or reverse proxy.
host = 127.0.0.1
; HTTP port for the Liquid Stoolap REST API.
port = 8321
; API prefix. "/" exposes /health, /auth/token, and /sql. Example: /api/v1 exposes /api/v1/sql.
base_path = /
; Maximum accepted request body size in bytes.
request_body_limit_bytes = 1048576
; Maximum rows materialized into one JSON result set. Larger results are returned with "truncated": true.
max_result_rows = 10000
; Maximum number of in-flight HTTP requests. Values above 1 enable threaded HTTP handling.
max_concurrent_requests = 32
; Browser CORS support. Usually keep disabled for server-to-server and local automation use.
cors_enabled = false
; CORS Access-Control-Allow-Origin value used only when cors_enabled = true.
cors_allow_origin = *
; If true, /health also requires a bearer token.
health_requires_auth = false

[stoolap]
; Path to the Stoolap shared library built with the C FFI feature.
library_path = ../.cargo-target/release/libstoolap.so
; Use memory:// for an ephemeral DB, or a filesystem path such as ./data/stoolap.db for persistence.
database_path = ./data/stoolap.db
; If true, SQL commands are rejected by the HTTP layer; read queries still work.
read_only = false
; Number of cloned Stoolap handles used for parallel SQL execution. 0 means max_concurrent_requests.
; Each HTTP SQL request uses one handle exclusively, matching Stoolap's thread-safety rules.
sql_worker_count = 0
; Default backend execution timeout in milliseconds when a request does not provide timeout_ms.
busy_timeout_ms = 5000
; Run SELECT 1 against Stoolap during startup. If it fails, /health reports ready=false.
startup_check = true

[auth]
; If true, protected endpoints require Authorization: Bearer ...
enabled = true
; If true, clients can exchange username/password for a short-lived token via /auth/token.
issue_tokens = true
; Username used by /auth/token when issue_tokens = true.
username = admin
; File containing the password on the first line. Do not store the password inline in this config.
password_file =
; Issued token lifetime in seconds.
token_ttl_seconds = 3600
; Maximum number of in-memory issued tokens retained at once.
max_issued_tokens = 4096
; If true, tokens from static_tokens_file are accepted without calling /auth/token.
allow_static_tokens = false
; One static token per line. Lines starting with # are ignored; "token = label" syntax is accepted.
static_tokens_file =
; Issued in-memory tokens are not persisted across restart when this is true.
token_revoke_on_restart = true

[timeouts]
; Default request timeout in milliseconds for server-side operations that do not have a narrower backend timeout.
request_timeout_ms = 30000
; Maximum accepted per-request SQL timeout_ms. Larger client values are clamped to this value.
max_sql_timeout_ms = 60000
; Grace period for SIGTERM/SIGINT shutdown.
shutdown_grace_ms = 15000

[logging]
; Minimum log level reserved for future filtering. Current access and SQL logs are INFO JSON lines.
level = INFO
; Log format. v1 writes JSON lines.
format = json
; Emit one JSON access log record per HTTP request.
access_log = true
; Emit accepted SQL text in a separate JSON log record.
sql_log = false
; If sql_log = true, hide SQL parameter values.
redact_sql_params = true
; Include request_id in logs and responses where applicable.
include_request_id = true

[observability]
; Reserved for post-1.0. v1 rejects enable_metrics = true instead of silently starting without metrics.
enable_metrics = false
; Reserved for post-1.0 metrics server.
metrics_bind_host = 127.0.0.1
; Reserved for post-1.0 metrics server.
metrics_port = 9095

[cli]
; Default CLI output format. v1 uses json.
default_output = json
